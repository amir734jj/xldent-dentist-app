name: Release

on:
  push:
    branches:
      - master

env:
  DOTNET_VERSION: '10.0.x'
  VERSION_PREFIX: '1.0'

jobs:
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.VERSION }}
    steps:
      - name: Extract version
        id: ver
        shell: bash
        run: echo "VERSION=${{ env.VERSION_PREFIX }}.${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          gh release create v${{ steps.ver.outputs.VERSION }}
          --repo ${{ github.repository }}
          --title "XLDent v${{ steps.ver.outputs.VERSION }}"
          --draft=false

  build:
    name: Build & Upload (${{ matrix.rid }})
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mainExe: ConsoleApp.exe
          - os: ubuntu-latest
            rid: linux-x64
            mainExe: ConsoleApp
          - os: macos-latest
            rid: osx-x64
            mainExe: ConsoleApp

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish ConsoleApp/ConsoleApp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:UseAppHost=true
          -o publish/${{ matrix.rid }}

      - name: Pack
        shell: bash
        run: >
          vpk pack
          --packId      XLDent
          --packVersion ${{ needs.create-release.outputs.version }}
          --packDir     publish/${{ matrix.rid }}
          --mainExe     ${{ matrix.mainExe }}
          --outputDir   releases/${{ matrix.rid }}

      - name: Upload to GitHub Release
        shell: bash
        run: >
          vpk upload github
          --repoUrl     https://github.com/${{ github.repository }}
          --token       ${{ secrets.GITHUB_TOKEN }}
          --tag         v${{ needs.create-release.outputs.version }}
          --releaseName "XLDent v${{ needs.create-release.outputs.version }}"
          --outputDir   releases/${{ matrix.rid }}

