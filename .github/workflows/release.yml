name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  release:
    name: Build & Release (${{ matrix.rid }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            mainExe: ConsoleApp.exe
          - os: ubuntu-latest
            rid: linux-x64
            mainExe: ConsoleApp
          - os: macos-latest
            rid: osx-x64
            mainExe: ConsoleApp

    runs-on: ${{ matrix.os }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install vpk
        run: dotnet tool install -g vpk

      - name: Add dotnet tools to PATH
        shell: bash
        run: echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Extract version
        id: ver
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Publish
        run: >
          dotnet publish ConsoleApp/ConsoleApp.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained
          -p:UseAppHost=true
          -o publish/${{ matrix.rid }}

      - name: Pack
        shell: bash
        run: >
          vpk pack
          --packId      XLDent
          --packVersion ${{ steps.ver.outputs.VERSION }}
          --packDir     publish/${{ matrix.rid }}
          --mainExe     ${{ matrix.mainExe }}
          --outputDir   releases/${{ matrix.rid }}

      - name: Upload to GitHub Release
        shell: bash
        run: >
          vpk upload github
          --repoUrl     https://github.com/${{ github.repository }}
          --token       ${{ secrets.GITHUB_TOKEN }}
          --tag         ${{ github.ref_name }}
          --releaseName "XLDent ${{ github.ref_name }}"
          --publish
          --inputDir    releases/${{ matrix.rid }}

